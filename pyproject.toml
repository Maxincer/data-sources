[build-system]
requires = ["setuptools>=64.0"]
build-backend = "setuptools.build_meta"

[project]
name = "data-sources"
version = "0.1.0"
description = "Maxincer's independent data sources"
requires-python = ">=3.10"
dependencies = [
    "requests>=2.28.0",
    "fire>=0.5.0",
    "pymysql>=1.0.2",
    "playwright>=1.40.0",
    "beautifulsoup4>=4.12.0",
    "tushare>=1.4.0",
]

[project.scripts]
fetcher = "data_sources.fetcher:main"
writer = "data_sources.writer:main"
reporter = "data_sources.reporter:main"

[tool.setuptools.packages.find]
where = ["src", "libs/mxz-utils/src"]
include = ["data_sources*", "mxz_utils*"]
